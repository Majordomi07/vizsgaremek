<!DOCTYPE html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>újmeló | Bejelentkezés</title>
    <link rel="stylesheet" href="../assets/css/global.css" />
    <link rel="stylesheet" href="../assets/css/login.css" />
  </head>
  <body>
    <main>
      <div class="design">
        <div class="logo">
          <a href="/">
            <img src="../assets/images/logo-white.svg" />
          </a>
        </div>
        <div class="blob"></div>
      </div>
      <div class="form">
        <img src="../assets/images/logo.svg" />
        <h2>Bejelentkezés</h2>
        <form id="loginForm">
          <div>
            <label>Email cím</label>
            <input type="text" placeholder="valaki@valami.com" />
            <p id="emailError" class="error"></p>
          </div>
          <div>
            <label>Jelszó</label>
            <input type="password" placeholder="Jelszó" />
            <p id="passwordError" class="error"></p>
          </div>
          <a href="/register">Fiók létrehozása</a>
          <div class="button">
            <button type="submit">Bejelentkezés</button>
          </div>
        </form>
      </div>
    </main>

    <script src="../assets/js/connection/login.js"></script>
  </body>
</html>
